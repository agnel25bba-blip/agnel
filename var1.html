<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Portal - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 24px;
        }

        /* Placeholder for your college logo */
        .college-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 50%;
            /* Optional: background color if your logo has a transparent background */
            background-color: #f8f9fa; 
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1e3c72;
        }

        .utilities {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .utilities a {
            color: #1e3c72;
            text-decoration: none;
        }

        .utilities a:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #1e3c72;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-btn:hover {
            background-color: #152b52;
        }

        .footer-text {
            margin-top: 24px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Logo Section -->
        <div class="logo-container">
            <!-- REPLACE 'https://via.placeholder.com/100' WITH YOUR ACTUAL COLLEGE LOGO URL OR IMAGE PATH -->
            <img src="kprcas.png" alt="College Logo" class="college-logo">
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Please login to your campus account</p>

        <!-- Form Section -->
        <form action="#" method="POST">
            <div class="input-group">
                <label for="username">Student / Faculty ID</label>
                <input type="text" id="username" name="username" placeholder="Enter your ID" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="utilities">
                <label>
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="footer-text">
            <p>&copy; 2026 Your College Name. All rights reserved.</p>
        </div>
    </div>

</body>
</html>
